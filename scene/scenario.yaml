# Simplified search-and-rescue scenario.
# The build_scene.py and coppelia_bridge.py scripts both accept this file
# via --config, so you only have to edit it in one place.
#
# Coordinates are in metres, in the world frame.  Weight is "light" or
# "heavy" (heavy victims require two rescuers cooperating to lift).

victims:
  - { id: victim_1, x:  5.0, y:  3.0, weight: light }
  - { id: victim_2, x: -4.0, y: -3.0, weight: heavy }
  - { id: victim_3, x: -3.0, y:  4.0, weight: light }